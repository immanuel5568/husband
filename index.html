<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My Husband</title>

    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-image: url('1.Jpeg');
            --text-main: #fff9f4;
            --accent-rose: #ff6fa5;
            --accent-gold: #e8b978;
            --ink-deep: #170a1f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overflow-x: hidden;
        }

        html, body {
            width: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--ink-deep);
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 32px 0;
            overflow: hidden;
        }

        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(circle at 50% 15%, rgba(255, 111, 165, 0.16), transparent 55%),
                linear-gradient(rgba(12, 5, 20, 0.78), rgba(12, 5, 20, 0.9)),
                var(--bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            pointer-events: none;
        }

        /* Slow ambient gradient drift behind everything, active immediately */
        .glow-layer {
            position: fixed;
            inset: -10%;
            z-index: 1;
            pointer-events: none;
            background:
                radial-gradient(circle at 20% 30%, rgba(255, 111, 165, 0.16), transparent 45%),
                radial-gradient(circle at 80% 70%, rgba(232, 185, 120, 0.14), transparent 45%),
                radial-gradient(circle at 50% 90%, rgba(255, 111, 165, 0.1), transparent 50%);
            filter: blur(20px);
            animation: driftGlow 14s ease-in-out infinite alternate;
        }

        @keyframes driftGlow {
            0%   { transform: translate(0, 0) scale(1); opacity: 0.75; }
            50%  { transform: translate(2%, -3%) scale(1.08); opacity: 1; }
            100% { transform: translate(-2%, 2%) scale(1.02); opacity: 0.8; }
        }

        /* Twinkling stars, active immediately in the background */
        .stars-layer {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            border-radius: 50%;
            background: var(--accent-gold);
            opacity: 0;
            animation: twinkle 3.5s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.6); }
            50% { opacity: 0.85; transform: scale(1); }
        }

        .container {
            position: relative;
            z-index: 5;
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Luxury Welcome Screen to Overcome Browser Audio Restrictions */
        .welcome-gate {
            text-align: center;
            color: var(--text-main);
            cursor: pointer;
            width: 84%;
            max-width: 340px;
            padding: 40px 26px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(232, 185, 120, 0.35);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 24px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.55);
            animation: pulseGate 2.2s infinite ease-in-out;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        @keyframes pulseGate {
            0%, 100% { transform: scale(1); box-shadow: 0 20px 45px rgba(0,0,0,0.55); }
            50% { transform: scale(1.015); box-shadow: 0 20px 55px rgba(255, 111, 165, 0.22); }
        }

        .welcome-gate .eyebrow {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent-gold);
            margin-bottom: 12px;
            opacity: 0.9;
        }

        .welcome-gate h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 28px;
            margin-bottom: 18px;
            letter-spacing: -0.5px;
        }

        /* Tap button, centered within the gate */
        .tap-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            padding: 14px 30px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 2.5px;
            color: var(--ink-deep);
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-rose));
            border-radius: 999px;
            box-shadow: 0 8px 24px rgba(255, 111, 165, 0.35);
            animation: pulseBtn 1.8s infinite ease-in-out;
        }

        @keyframes pulseBtn {
            0%, 100% { transform: scale(1); box-shadow: 0 8px 24px rgba(255, 111, 165, 0.35); }
            50% { transform: scale(1.05); box-shadow: 0 10px 30px rgba(255, 111, 165, 0.55); }
        }

        /* Minimal Centered Countdown */
        #count {
            display: none;
            font-family: 'Playfair Display', serif;
            font-size: 120px;
            font-weight: 700;
            color: var(--text-main);
            text-shadow: 0 0 50px rgba(255, 111, 165, 0.65);
            animation: pulseCount 1s infinite ease-in-out;
        }

        @keyframes pulseCount {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* Clean Stage Layout */
        .stage {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 820px;
            padding: 16px;
            animation: fadeInStage 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInStage {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Premium Centered Frame — mobile sized by default */
        .frame-container {
            position: relative;
            width: 84vw;
            max-width: 330px;
            height: 78vw;
            max-height: 380px;
            border: 1px solid transparent;
            border-radius: 22px;
            padding: 12px;
            box-shadow: 0 25px 55px rgba(0, 0, 0, 0.6),
                        0 0 45px rgba(255, 111, 165, 0.12);
            margin-bottom: 26px;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.03)),
                linear-gradient(135deg, var(--accent-gold), rgba(255, 255, 255, 0) 40%, var(--accent-rose));
            background-origin: border-box, border-box;
            background-clip: padding-box, border-box;
        }

        .frame-container,
        .kicker,
        #typing {
            opacity: 0;
            transition: opacity 1s ease;
        }

        .stage.revealed .frame-container,
        .stage.revealed .kicker,
        .stage.revealed #typing {
            opacity: 1;
        }

        .slideshow-window {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transform: scale(1.06);
            transition: opacity 1.2s ease-in-out, transform 5s ease;
        }

        .slide.active {
            opacity: 1;
            transform: scale(1);
        }

        /* Elegant Typography Section Below Image */
        .message-box {
            text-align: center;
            color: var(--text-main);
            max-width: 340px;
            padding: 0 8px;
        }

        .kicker {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent-gold);
            margin-bottom: 10px;
            display: block;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 14px;
            letter-spacing: -0.5px;
            line-height: 1.15;
            background: linear-gradient(135deg, #ffffff 45%, #ffbcd4 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        /* Big standalone "Happy Birthday" hero, centered on screen for 3 seconds */
        .hero-title {
            position: fixed;
            inset: 0;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
            pointer-events: none;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 40px;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ffffff 40%, #ffbcd4 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 60px rgba(255, 111, 165, 0.55);
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.9s ease, transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .hero-title.show {
            opacity: 1;
            transform: scale(1);
        }

        #typing {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 500;
            line-height: 1.55;
            color: rgba(255, 249, 244, 0.92);
            min-height: 110px;
        }

        /* Decorative Background Particles */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            bottom: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(105vh) scale(0.8); opacity: 0; }
            15% { opacity: 0.6; }
            85% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        @keyframes fallDown {
            0% { transform: translateY(-10vh) scale(0.8) rotate(0deg); opacity: 0; }
            15% { opacity: 0.6; }
            85% { opacity: 0.6; }
            100% { transform: translateY(105vh) scale(1.2) rotate(25deg); opacity: 0; }
        }

        .particle.falling {
            top: 0;
            bottom: auto;
        }

        /* Scale up gracefully on tablets and desktop */
        @media (min-width: 700px) {
            .welcome-gate { width: auto; max-width: none; padding: 64px 72px; }
            .welcome-gate .eyebrow { font-size: 12px; letter-spacing: 4px; margin-bottom: 14px; }
            .welcome-gate h2 { font-size: 46px; margin-bottom: 20px; }
            .tap-btn { padding: 16px 38px; font-size: 13px; letter-spacing: 3px; }

            #count { font-size: 220px; }
            .hero-title { font-size: 92px; }

            .frame-container { width: 560px; max-width: none; height: 620px; max-height: none; padding: 18px; border-radius: 28px; margin-bottom: 38px; }
            .slideshow-window { border-radius: 20px; }

            .message-box { max-width: 640px; padding: 0; }
            .kicker { font-size: 13px; letter-spacing: 5px; margin-bottom: 16px; }
            h1 { font-size: 58px; margin-bottom: 22px; letter-spacing: -1px; }
            #typing { font-size: 26px; min-height: 130px; }
        }
    </style>
</head>
<body>

<div class="bg-layer"></div>
<div class="glow-layer"></div>
<div class="stars-layer" id="starsLayer"></div>

<!-- Background Audio Loop -->
<audio id="bgMusic" loop preload="auto">
    <source src="mp3.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <!-- 1. Welcome Interaction Gate -->
    <div class="welcome-gate" id="welcomeGate" onclick="unlockAndStart()">
        <span class="eyebrow">A Little Something</span>
        <h2>❤️ For My Husband ❤️</h2>
        <span class="tap-btn">Tap to Open</span>
    </div>

    <!-- 2. Countdown Element -->
    <div id="count">3</div>

    <!-- 2b. Big standalone "Happy Birthday" hero, centered, before the stage reveals -->
    <div class="hero-title" id="heroTitle">❤️ Happy Birthday Mine Husband ❤️</div>

    <!-- 3. Redesigned Stage Display -->
    <div class="stage" id="birthdayStage">
        <div class="frame-container">
            <div class="slideshow-window">
                <img src="2.Jpeg" class="slide active" alt="Memory">
               
                <img src="3.Jpeg" class="slide" alt="Memory">
                <img src="5.Jpeg" class="slide" alt="Memory">
                <img src="6.Jpeg" class="slide" alt="Memory">
                <img src="7.Jpeg" class="slide" alt="Memory">
                <img src="8.Jpeg" class="slide" alt="Memory">
            </div>
        </div>

        <div class="message-box">
            <span class="kicker">Today Is All About You</span>
            <h1>Happy Birthday, My Love</h1>
            <p id="typing"></p>
        </div>
    </div>
</div>

<script>
    const gateEl = document.getElementById("welcomeGate");
    const countEl = document.getElementById("count");
    const stageEl = document.getElementById("birthdayStage");
    const audioTrack = document.getElementById("bgMusic");
    const textTarget = document.getElementById("typing");
    const imageSlides = document.querySelectorAll(".slide");
    const starsLayer = document.getElementById("starsLayer");
    const heroTitle = document.getElementById("heroTitle");

    const loveLetter = "You are my happiness, my strength, my best friend, and my forever love. ❤️ Every moment with you is a beautiful blessing. May this year bring you endless joy and all the success in the world. I Love You.";

    let countTime = 3;
    let currentActiveIdx = 0;

    // Scatter twinkling stars across the background immediately on load
    function scatterStars(count) {
        for (let i = 0; i < count; i++) {
            const star = document.createElement("div");
            star.className = "star";
            const size = Math.random() * 2.5 + 1.5;
            star.style.width = size + "px";
            star.style.height = size + "px";
            star.style.left = Math.random() * 100 + "vw";
            star.style.top = Math.random() * 100 + "vh";
            star.style.animationDelay = (Math.random() * 3.5) + "s";
            star.style.animationDuration = (Math.random() * 2 + 2.5) + "s";
            starsLayer.appendChild(star);
        }
    }
    scatterStars(45);

    // Gentle ambient particles drifting even before the gate is tapped
    let preTapAmbience = null;
    let preTapAmbienceFall = null;
    function startPreTapAmbience() {
        preTapAmbience = setInterval(() => spawnParticle("✨"), 1400);
        preTapAmbienceFall = setInterval(() => spawnParticle("✨", true), 2000);
    }
    startPreTapAmbience();

    // Triggered instantly when user taps the screen
    function unlockAndStart() {
        // Try playing the audio immediately to acquire browser authorization
        audioTrack.play().then(() => {
            // Pause it temporarily so it builds tension during the 3 second countdown
            audioTrack.pause();
            audioTrack.currentTime = 0;
        }).catch(err => console.log("Audio warm-up initialized"));

        // Hide welcome gate and reveal countdown
        gateEl.style.display = "none";
        countEl.style.display = "block";

        // Slow the gentle pre-tap ambience so the big reveal feels special
        if (preTapAmbience) clearInterval(preTapAmbience);
        if (preTapAmbienceFall) clearInterval(preTapAmbienceFall);

        // Begin clean countdown sequence
        const countdownTimer = setInterval(() => {
            countTime--;
            if (countTime > 0) {
                countEl.innerHTML = countTime;
            } else {
                clearInterval(countdownTimer);
                countEl.style.display = "none";
                stageEl.style.display = "flex";

                // Play the song right away
                audioTrack.play();
                startAmbience();

                // Big standalone "Happy Birthday" appears centered on screen...
                heroTitle.classList.add("show");

                // ...holds for 3 seconds, then fades out as the full stage reveals
                setTimeout(() => {
                    heroTitle.classList.remove("show");
                    stageEl.classList.add("revealed");
                    beginTypewriter();
                    runSlideshow();
                }, 3000);
            }
        }, 1000);
    }

    // Typewriter System
    let stringCursor = 0;
    function beginTypewriter() {
        textTarget.innerHTML = "";
        writeCharacter();
    }

    function writeCharacter() {
        if (stringCursor < loveLetter.length) {
            textTarget.innerHTML += loveLetter.charAt(stringCursor);
            stringCursor++;
            setTimeout(writeCharacter, 35);
        }
    }

    // Image Slideshow Rotation
    function runSlideshow() {
        setInterval(() => {
            imageSlides[currentActiveIdx].classList.remove("active");
            currentActiveIdx = (currentActiveIdx + 1) % imageSlides.length;
            imageSlides[currentActiveIdx].classList.add("active");
        }, 3800);
    }

    // Soft Environment Particles (fuller celebration effect after opening)
    // Mixes rising particles from the bottom with falling ones from the top
    function startAmbience() {
        setInterval(() => spawnParticle("❤️"), 600);
        setInterval(() => spawnParticle("✨"), 900);
        setInterval(() => spawnParticle("❤️", true), 750);
        setInterval(() => spawnParticle("✨", true), 1050);
    }

    function spawnParticle(symbol, falling = false) {
        const leaf = document.createElement("div");
        leaf.className = falling ? "particle falling" : "particle";
        leaf.innerText = symbol;
        leaf.style.left = Math.random() * 90 + 5 + "vw";
        const isMobile = window.innerWidth < 700;
        leaf.style.fontSize = (isMobile ? (Math.random() * 8 + 12) : (Math.random() * 12 + 18)) + "px";

        const runtime = Math.random() * 4 + 7;
        leaf.style.animation = `${falling ? "fallDown" : "floatUp"} ${runtime}s linear forwards`;

        document.body.appendChild(leaf);
        setTimeout(() => leaf.remove(), runtime * 1000);
    }
</script>

</body>
</html>
